name: Python tests

on:
  pull_request:
  push:
    branches:
      - main
      - "phase-*"
      - "phase-*/**"

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python_tests_required: ${{ steps.changed-files.outputs.python_tests_required }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check diff whitespace
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "$empty_tree" "${{ github.sha }}"
          fi

      - name: Detect Markdown-only changes
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > "$changed_files"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > "$changed_files"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --name-only "$empty_tree" "${{ github.sha }}" > "$changed_files"
          fi

          echo "Changed files:"
          sed 's/^/- /' "$changed_files"

          if [[ ! -s "$changed_files" ]]; then
            echo "python_tests_required=false" >> "$GITHUB_OUTPUT"
          elif grep -Ev '\.md$' "$changed_files" > /dev/null; then
            echo "python_tests_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_tests_required=false" >> "$GITHUB_OUTPUT"
          fi

  api-tests:
    name: API unittest
    needs: detect-changes
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Fail when change detection fails
        if: needs.detect-changes.result != 'success'
        run: |
          echo "Change detection or whitespace check failed."
          exit 1

      - name: Skip API unit tests
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'false'
        run: echo "Only Markdown files changed. Skipping API unit tests."

      - name: Checkout repository
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run API unit tests
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        working-directory: apps/api
        env:
          PYTHONPATH: src
        run: uv run --locked python -m unittest discover -s tests

  scraper-tests:
    name: Scraper unittest
    needs: detect-changes
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Fail when change detection fails
        if: needs.detect-changes.result != 'success'
        run: |
          echo "Change detection or whitespace check failed."
          exit 1

      - name: Skip scraper unit tests
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'false'
        run: echo "Only Markdown files changed. Skipping scraper unit tests."

      - name: Checkout repository
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run scraper unit tests
        if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.python_tests_required == 'true'
        working-directory: packages/scraper
        env:
          PYTHONPATH: src
        run: uv run --locked python -m unittest discover -s tests
