name: API tests

on:
  pull_request:
  push:
    branches:
      - main
      - "phase-*"
      - "phase-*/**"

permissions:
  contents: read

jobs:
  api-tests:
    name: API unittest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check diff whitespace
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "$empty_tree" "${{ github.sha }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run API unit tests
        working-directory: apps/api
        env:
          PYTHONPATH: src
        run: uv run --locked python -m unittest discover -s tests
